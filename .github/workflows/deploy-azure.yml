name: Deploy Azure Container App

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: anbud-prod
  CONTAINER_APP: anbud
  PROJECT_JOB_WORKER_APP: anbud-project-job-worker
  ACR_NAME: anbudprod9841703
  IMAGE_NAME: anbud
  MIN_REPLICAS: "1"
  NODE_VERSION: "22.14.0"

jobs:
  deploy:
    name: Production deployment
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-azure
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Validate production durable-job schema
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: node scripts/validate_project_jobs_schema.mjs --remote

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Capture last healthy images
        run: |
          current_app_image="$(az containerapp show --resource-group "$RESOURCE_GROUP" --name "$CONTAINER_APP" --query "properties.template.containers[?name=='web'].image | [0]" --output tsv)"
          current_worker_image="$(az containerapp job show --resource-group "$RESOURCE_GROUP" --name "$PROJECT_JOB_WORKER_APP" --query "properties.template.containers[?name=='worker'].image | [0]" --output tsv)"
          if [ -z "$current_app_image" ] || [ -z "$current_worker_image" ]; then
            echo "::error::Could not resolve the current healthy application images."
            exit 1
          fi
          echo "CURRENT_APP_IMAGE=$current_app_image" >> "$GITHUB_ENV"
          echo "CURRENT_WORKER_IMAGE=$current_worker_image" >> "$GITHUB_ENV"

      - name: Reconcile infrastructure without releasing candidate code
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          APP_ACCESS_PASSWORD: ${{ secrets.APP_ACCESS_PASSWORD }}
          APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
          PROJECT_JOB_WORKER_TOKEN: ${{ secrets.PROJECT_JOB_WORKER_TOKEN }}
          PROJECT_JOB_WORKER_CRON: ${{ vars.PROJECT_JOB_WORKER_CRON || '*/5 * * * *' }}
          PROJECT_JOB_WORKER_LIMIT: ${{ vars.PROJECT_JOB_WORKER_LIMIT || '2' }}
          DOCLING_ENHANCEMENT_MODE: ${{ vars.DOCLING_ENHANCEMENT_MODE || 'async' }}
          DOCLING_ASYNC_AUTO_RUN: ${{ vars.DOCLING_ASYNC_AUTO_RUN || 'off' }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          missing=0
          for name in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY APP_ENCRYPTION_KEY APP_ACCESS_PASSWORD APP_SESSION_SECRET OPENAI_API_KEY PROJECT_JOB_WORKER_TOKEN ACR_USERNAME ACR_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub production secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          common_parameters=(
            appName="$CONTAINER_APP"
            image="$CURRENT_APP_IMAGE"
            workerImage="$CURRENT_WORKER_IMAGE"
            registryServer="${ACR_NAME}.azurecr.io"
            registryUsername="$ACR_USERNAME"
            registryPassword="$ACR_PASSWORD"
            supabaseUrl="$SUPABASE_URL"
            supabaseServiceRoleKey="$SUPABASE_SERVICE_ROLE_KEY"
            appEncryptionKey="$APP_ENCRYPTION_KEY"
            appAccessPassword="$APP_ACCESS_PASSWORD"
            appSessionSecret="$APP_SESSION_SECRET"
            openAiApiKey="$OPENAI_API_KEY"
            openAiModel="$OPENAI_MODEL"
            projectJobWorkerToken="$PROJECT_JOB_WORKER_TOKEN"
            projectJobWorkerCron="$PROJECT_JOB_WORKER_CRON"
            projectJobWorkerLimit="$PROJECT_JOB_WORKER_LIMIT"
            doclingEnhancementMode="$DOCLING_ENHANCEMENT_MODE"
            doclingAsyncAutoRun="$DOCLING_ASYNC_AUTO_RUN"
            minReplicas="$MIN_REPLICAS"
          )

          az deployment group what-if --resource-group "$RESOURCE_GROUP" --template-file infra/azure/container-app.bicep --result-format ResourceIdOnly --parameters "${common_parameters[@]}"

          az deployment group create --resource-group "$RESOURCE_GROUP" --name "anbud-infra-${GITHUB_SHA}" --template-file infra/azure/container-app.bicep --parameters "${common_parameters[@]}" --output none

      - name: Docker login to ACR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and push candidate image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: apps/frontend/Dockerfile
          target: runner-docling
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Scan candidate image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Roll out zero-traffic candidate and promote
        id: rollout
        env:
          CANDIDATE_IMAGE: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          REVISION_SUFFIX: sha-${{ github.sha }}
          ROLLOUT_STATE_FILE: ${{ runner.temp }}/anbud-rollout-state.json
        run: node scripts/azure_containerapp_rollout.mjs

      - name: Fallback rollback
        if: always() && (steps.rollout.outcome == 'failure' || steps.rollout.outcome == 'cancelled')
        run: |
          state_file="${RUNNER_TEMP}/anbud-rollout-state.json"
          if [ -f "$state_file" ]; then
            node scripts/azure_containerapp_rollout.mjs --rollback-state "$state_file"
          fi
