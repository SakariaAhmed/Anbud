name: Deploy Azure Container App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: anbud-prod
  CONTAINER_APP: anbud
  ACR_NAME: anbudprod9841703
  IMAGE_NAME: anbud

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Docker login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Ensure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Sync Container App secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          APP_ACCESS_PASSWORD: ${{ secrets.APP_ACCESS_PASSWORD }}
          APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          secret_args=()
          env_args=()

          add_secret() {
            local secret_name="$1"
            local env_name="$2"
            local value="$3"
            local github_secret_name="$4"

            if [ -z "$value" ]; then
              echo "::notice::Skipping missing GitHub secret: $github_secret_name"
              return
            fi

            secret_args+=("$secret_name=$value")
            env_args+=("$env_name=secretref:$secret_name")
          }

          add_secret "supabase-url" "SUPABASE_URL" "$SUPABASE_URL" "SUPABASE_URL"
          add_secret "supabase-service-role-key" "SUPABASE_SERVICE_ROLE_KEY" "$SUPABASE_SERVICE_ROLE_KEY" "SUPABASE_SERVICE_ROLE_KEY"
          add_secret "app-encryption-key" "APP_ENCRYPTION_KEY" "$APP_ENCRYPTION_KEY" "APP_ENCRYPTION_KEY"
          add_secret "app-access-password" "APP_ACCESS_PASSWORD" "$APP_ACCESS_PASSWORD" "APP_ACCESS_PASSWORD"
          add_secret "app-session-secret" "APP_SESSION_SECRET" "$APP_SESSION_SECRET" "APP_SESSION_SECRET"
          add_secret "openai-api-key" "OPENAI_API_KEY" "$OPENAI_API_KEY" "OPENAI_API_KEY"

          if [ -n "$ACR_PASSWORD" ]; then
            secret_args+=("registry-password=$ACR_PASSWORD")
          else
            echo "::notice::Skipping missing GitHub secret: ACR_PASSWORD"
          fi

          if [ "${#secret_args[@]}" -gt 0 ]; then
            az containerapp secret set \
              --resource-group "$RESOURCE_GROUP" \
              --name "$CONTAINER_APP" \
              --secrets "${secret_args[@]}"
          fi

          env_args+=("OPENAI_MODEL=$OPENAI_MODEL")

          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP" \
            --set-env-vars "${env_args[@]}"

      - name: Update Container App image
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP" \
            --image "${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${GITHUB_SHA}"
