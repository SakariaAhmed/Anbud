name: Deploy Azure Container App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: anbud-prod
  CONTAINER_APP: anbud
  ACR_NAME: anbudprod9841703
  IMAGE_NAME: anbud
  MIN_REPLICAS: "1"
  FALLOW_VERSION: "2.104.0"
  NODE_VERSION: "22.14.0"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # SHAs resolve to Node 24-compatible release tags:
      # actions/checkout@v5, actions/setup-node@v6.4.0,
      # azure/login@v3, docker/login-action@v4,
      # docker/setup-buildx-action@v4, docker/build-push-action@v7.
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Validate frontend
        working-directory: apps/frontend
        run: |
          npm ci
          npm run secrets:scan
          npm test
          npm run lint
          npm run build

      - name: Fallow static quality gate
        run: |
          FALLOW_UPDATE_CHECK=off npx --yes "fallow@$FALLOW_VERSION" --root . --format json --score --performance > /tmp/fallow-combined.json
          FALLOW_UPDATE_CHECK=off npx --yes "fallow@$FALLOW_VERSION" fix --root . --dry-run --yes --no-create-config --format json > /tmp/fallow-fix-preview.json
          node - <<'NODE'
          const fs = require("node:fs");
          function readJson(path) {
            const raw = fs.readFileSync(path, "utf8");
            return JSON.parse(raw.slice(raw.indexOf("{")));
          }
          const combined = readJson("/tmp/fallow-combined.json");
          const fixPreview = readJson("/tmp/fallow-fix-preview.json");
          const totalIssues = combined.check?.total_issues ?? 0;
          const totalFixes = fixPreview.summary?.total_fixes ?? fixPreview.fixes?.length ?? 0;
          console.log(JSON.stringify({ fallow_total_issues: totalIssues, fallow_fix_preview_total_fixes: totalFixes }));
          if (totalIssues > 0 || totalFixes > 0) process.exit(1);
          NODE

      - name: Docker production image smoke
        working-directory: apps/frontend
        run: npm run docker:smoke:docling

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Docker login to ACR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: apps/frontend/Dockerfile
          target: runner-docling
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Scan pushed production image
        uses: docker/scout-action@2688993af7bafd6ba8c6a74ec652442be91dd82b
        with:
          command: cves
          image: registry://${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          platform: linux/amd64
          only-severities: critical,high
          exit-code: true
          registry-user: ${{ secrets.ACR_USERNAME }}
          registry-password: ${{ secrets.ACR_PASSWORD }}
          write-comment: false

      - name: Ensure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Deploy Container App and worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          APP_ACCESS_PASSWORD: ${{ secrets.APP_ACCESS_PASSWORD }}
          APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
          PROJECT_JOB_WORKER_TOKEN: ${{ secrets.PROJECT_JOB_WORKER_TOKEN }}
          PROJECT_JOB_WORKER_CRON: ${{ vars.PROJECT_JOB_WORKER_CRON || '*/5 * * * *' }}
          PROJECT_JOB_WORKER_LIMIT: ${{ vars.PROJECT_JOB_WORKER_LIMIT || '2' }}
          DOCLING_ENHANCEMENT_MODE: ${{ vars.DOCLING_ENHANCEMENT_MODE || 'async' }}
          DOCLING_ASYNC_AUTO_RUN: ${{ vars.DOCLING_ASYNC_AUTO_RUN || 'off' }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          missing=0
          for name in \
            SUPABASE_URL \
            SUPABASE_SERVICE_ROLE_KEY \
            APP_ENCRYPTION_KEY \
            APP_ACCESS_PASSWORD \
            APP_SESSION_SECRET \
            OPENAI_API_KEY \
            PROJECT_JOB_WORKER_TOKEN \
            ACR_USERNAME \
            ACR_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "anbud-${GITHUB_SHA}" \
            --template-file infra/azure/container-app.bicep \
            --parameters \
              appName="$CONTAINER_APP" \
              image="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${GITHUB_SHA}" \
              registryServer="${ACR_NAME}.azurecr.io" \
              registryUsername="$ACR_USERNAME" \
              registryPassword="$ACR_PASSWORD" \
              supabaseUrl="$SUPABASE_URL" \
              supabaseServiceRoleKey="$SUPABASE_SERVICE_ROLE_KEY" \
              appEncryptionKey="$APP_ENCRYPTION_KEY" \
              appAccessPassword="$APP_ACCESS_PASSWORD" \
              appSessionSecret="$APP_SESSION_SECRET" \
              openAiApiKey="$OPENAI_API_KEY" \
              openAiModel="$OPENAI_MODEL" \
              projectJobWorkerToken="$PROJECT_JOB_WORKER_TOKEN" \
              projectJobWorkerCron="$PROJECT_JOB_WORKER_CRON" \
              projectJobWorkerLimit="$PROJECT_JOB_WORKER_LIMIT" \
              doclingEnhancementMode="$DOCLING_ENHANCEMENT_MODE" \
              doclingAsyncAutoRun="$DOCLING_ASYNC_AUTO_RUN" \
              minReplicas="$MIN_REPLICAS"

          app_fqdn="$(az containerapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)"
          echo "$app_fqdn"
          echo "APP_FQDN=$app_fqdn" >> "$GITHUB_ENV"

          az containerapp job show \
            --resource-group "$RESOURCE_GROUP" \
            --name "${CONTAINER_APP}-project-job-worker" \
            --query "properties.configuration.triggerType" \
            --output tsv

      - name: Smoke test deployed health model
        run: node apps/frontend/scripts/smoke_health.mjs "https://${APP_FQDN}"
